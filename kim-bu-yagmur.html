<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">

    <style>
        /* ANA SAYFAYLA AYNI MİMARİ */
        :root {
            --dergi-kirmizi: #c8102e;
            --dergi-siyah: #111111;
            --dergi-koyu-gri: #333333;
            --dergi-acik-gri: #f4f4f4;
            --dergi-beyaz: #fcfcfc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--dergi-beyaz);
            color: var(--dergi-siyah);
            line-height: 1.8;
            overflow-x: hidden;
        }

        /* ÜST BANT VE MENÜ */
        .top-bar { background-color: var(--dergi-kirmizi); color: #fff; text-align: center; padding: 10px 15px; font-size: 0.75rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
        .top-bar a { color: #fff; text-decoration: underline; margin-left: 10px; font-weight: 800; }

        header { border-bottom: 2px solid var(--dergi-siyah); padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; background: var(--dergi-beyaz); position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 900; color: var(--dergi-siyah); text-decoration: none; letter-spacing: -1px; }
        .nav-links { display: flex; gap: 25px; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--dergi-koyu-gri); font-size: 0.85rem; font-weight: 600; letter-spacing: 1px; transition: color 0.3s; }
        .nav-links a:hover { color: var(--dergi-kirmizi); }

        /* BİYOGRAFİ (DERGİ ORTA SAYFASI GİBİ) */
        .bio-container {
            max-width: 750px;
            margin: 60px auto;
            padding: 0 20px;
        }
        
        .bio-subtitle {
            font-size: 0.8rem;
            color: var(--dergi-kirmizi);
            font-weight: 800;
            letter-spacing: 4px;
            margin-bottom: 15px;
            display: block;
            text-align: center;
            text-transform: uppercase;
        }
        
        .bio-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 6vw, 4.5rem);
            font-weight: 900;
            color: var(--dergi-siyah);
            text-align: center;
            margin-bottom: 50px;
            letter-spacing: -1px;
        }
